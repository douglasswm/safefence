version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safefence
      POSTGRES_USER: safefence
      POSTGRES_PASSWORD: safefence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  control-plane:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://safefence:safefence@postgres:5432/safefence
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      PORT: "3100"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
